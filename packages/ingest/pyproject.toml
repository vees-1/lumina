[project]
name = "ingest"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "lxml>=6.1.0",
    "pyhpo>=4.0.0",
    "sqlmodel>=0.0.38",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = [".."]
include = ["ingest*"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]
